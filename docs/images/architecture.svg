<svg xmlns="http://www.w3.org/2000/svg" width="800" height="400" viewBox="0 0 800 400">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#16213e"/>
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00b4d8"/>
      <stop offset="100%" style="stop-color:#0077b6"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="400" fill="url(#bgGrad)" rx="12"/>

  <!-- Title -->
  <text x="400" y="30" text-anchor="middle" fill="#00b4d8" font-family="Segoe UI,Arial,sans-serif" font-size="16" font-weight="bold">SYSTEM ARCHITECTURE</text>

  <!-- User Box -->
  <rect x="340" y="45" width="120" height="36" rx="8" fill="#0f3460" stroke="#00b4d8" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="400" y="68" text-anchor="middle" fill="#ffffff" font-family="Segoe UI,Arial,sans-serif" font-size="13" font-weight="bold">👤 User</text>

  <!-- Arrow: User → CLI -->
  <line x1="370" y1="81" x2="270" y2="110" stroke="#00b4d8" stroke-width="1.5" marker-end="url(#arrowhead)"/>
  <!-- Arrow: User → Streamlit -->
  <line x1="430" y1="81" x2="530" y2="110" stroke="#00b4d8" stroke-width="1.5" marker-end="url(#arrowhead)"/>

  <!-- Arrowhead marker -->
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto" fill="#00b4d8">
      <polygon points="0 0, 10 3.5, 0 7"/>
    </marker>
  </defs>

  <!-- CLI Box -->
  <rect x="190" y="110" width="160" height="40" rx="8" fill="#0f3460" stroke="#00b4d8" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="270" y="134" text-anchor="middle" fill="#ffffff" font-family="Segoe UI,Arial,sans-serif" font-size="12" font-weight="bold">💻 CLI (Click + Rich)</text>

  <!-- Streamlit Box -->
  <rect x="450" y="110" width="160" height="40" rx="8" fill="#0f3460" stroke="#00b4d8" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="530" y="134" text-anchor="middle" fill="#ffffff" font-family="Segoe UI,Arial,sans-serif" font-size="12" font-weight="bold">🌐 Streamlit Web UI</text>

  <!-- Arrow: CLI → Core -->
  <line x1="270" y1="150" x2="400" y2="185" stroke="#a0a0b0" stroke-width="1.5" marker-end="url(#arrowGray)"/>
  <!-- Arrow: Streamlit → Core -->
  <line x1="530" y1="150" x2="400" y2="185" stroke="#a0a0b0" stroke-width="1.5" marker-end="url(#arrowGray)"/>

  <defs>
    <marker id="arrowGray" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto" fill="#a0a0b0">
      <polygon points="0 0, 10 3.5, 0 7"/>
    </marker>
  </defs>

  <!-- Core Logic Box (large) -->
  <rect x="140" y="185" width="520" height="50" rx="10" fill="#0d2137" stroke="#00b4d8" stroke-width="2" filter="url(#shadow)"/>
  <text x="400" y="215" text-anchor="middle" fill="#00b4d8" font-family="Segoe UI,Arial,sans-serif" font-size="14" font-weight="bold">⚙️ FlashcardCreator Core (core.py)</text>

  <!-- Arrows from Core to sub-components -->
  <line x1="220" y1="235" x2="130" y2="270" stroke="#a0a0b0" stroke-width="1.5" marker-end="url(#arrowGray)"/>
  <line x1="320" y1="235" x2="290" y2="270" stroke="#a0a0b0" stroke-width="1.5" marker-end="url(#arrowGray)"/>
  <line x1="400" y1="235" x2="430" y2="270" stroke="#a0a0b0" stroke-width="1.5" marker-end="url(#arrowGray)"/>
  <line x1="520" y1="235" x2="570" y2="270" stroke="#a0a0b0" stroke-width="1.5" marker-end="url(#arrowGray)"/>
  <line x1="620" y1="235" x2="710" y2="270" stroke="#a0a0b0" stroke-width="1.5" marker-end="url(#arrowGray)"/>

  <!-- Ollama / LLM Box -->
  <rect x="55" y="270" width="150" height="45" rx="8" fill="#1a1a2e" stroke="#e07000" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="130" y="289" text-anchor="middle" fill="#e07000" font-family="Segoe UI,Arial,sans-serif" font-size="11" font-weight="bold">🦙 Ollama + Gemma 3</text>
  <text x="130" y="305" text-anchor="middle" fill="#a0a0b0" font-family="Segoe UI,Arial,sans-serif" font-size="10">LLM Generation</text>

  <!-- SpacedRepetition Box -->
  <rect x="220" y="270" width="140" height="45" rx="8" fill="#1a1a2e" stroke="#00b4d8" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="290" y="289" text-anchor="middle" fill="#ffffff" font-family="Segoe UI,Arial,sans-serif" font-size="11" font-weight="bold">🧠 SM-2 Algorithm</text>
  <text x="290" y="305" text-anchor="middle" fill="#a0a0b0" font-family="Segoe UI,Arial,sans-serif" font-size="10">SpacedRepetition</text>

  <!-- DeckManager Box -->
  <rect x="375" y="270" width="130" height="45" rx="8" fill="#1a1a2e" stroke="#00b4d8" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="440" y="289" text-anchor="middle" fill="#ffffff" font-family="Segoe UI,Arial,sans-serif" font-size="11" font-weight="bold">📚 DeckManager</text>
  <text x="440" y="305" text-anchor="middle" fill="#a0a0b0" font-family="Segoe UI,Arial,sans-serif" font-size="10">CRUD + Merge</text>

  <!-- ReviewSession Box -->
  <rect x="520" y="270" width="130" height="45" rx="8" fill="#1a1a2e" stroke="#00b4d8" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="585" y="289" text-anchor="middle" fill="#ffffff" font-family="Segoe UI,Arial,sans-serif" font-size="11" font-weight="bold">🎯 ReviewSession</text>
  <text x="585" y="305" text-anchor="middle" fill="#a0a0b0" font-family="Segoe UI,Arial,sans-serif" font-size="10">Quality 0–5</text>

  <!-- Import/Export Box -->
  <rect x="665" y="270" width="120" height="45" rx="8" fill="#1a1a2e" stroke="#00b4d8" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="725" y="289" text-anchor="middle" fill="#ffffff" font-family="Segoe UI,Arial,sans-serif" font-size="11" font-weight="bold">📤 Import/Export</text>
  <text x="725" y="305" text-anchor="middle" fill="#a0a0b0" font-family="Segoe UI,Arial,sans-serif" font-size="10">JSON &amp; CSV</text>

  <!-- Storage Layer -->
  <rect x="220" y="340" width="360" height="40" rx="8" fill="#0d2137" stroke="#555" stroke-width="1" stroke-dasharray="5,5"/>
  <text x="400" y="365" text-anchor="middle" fill="#a0a0b0" font-family="Segoe UI,Arial,sans-serif" font-size="12">💾 Storage Layer — ./decks/*.json  •  config.yaml  •  *.csv</text>

  <!-- Arrow: DeckManager → Storage -->
  <line x1="440" y1="315" x2="400" y2="340" stroke="#555" stroke-width="1" stroke-dasharray="4,3" marker-end="url(#arrowGray)"/>
</svg>
